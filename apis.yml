aid: montecarlodata
name: Monte Carlo
description: 'Monte Carlo is a data and AI observability platform that helps enterprise
  organizations find and fix bad data fast. The platform exposes a GraphQL API that
  powers all the same capabilities as the Monte Carlo web application, enabling programmatic
  management of data monitors, incidents, field health, and lineage across data warehouses,
  lakes, ETL, and BI. Developers can automate custom monitoring configurations, augment
  lineage with external resources, manage bulk operations, and push metadata from
  sources unreachable via standard collection through the Push Ingest API. Additional
  developer tools include a Python SDK (Pycarlo), a CLI for onboarding and integration
  operations, webhooks for routing incident data to custom platforms, and an Airflow
  provider for pipeline quality gates.

  '
